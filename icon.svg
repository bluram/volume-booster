<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6ee7d7"/>
      <stop offset="0.5" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- rounded squircle background -->
  <rect x="6" y="6" width="116" height="116" rx="30" fill="url(#bg)"/>
  <!-- top glass sheen -->
  <rect x="6" y="6" width="116" height="58" rx="30" fill="#ffffff" opacity="0.18"/>

  <!-- speaker body -->
  <path d="M40 52 H54 L74 36 V92 L54 76 H40 Z" fill="url(#glass)" stroke="#ffffff" stroke-width="2" stroke-linejoin="round"/>

  <!-- sound waves -->
  <g fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" filter="url(#soft)">
    <path d="M84 50 a18 18 0 0 1 0 28" opacity="0.95"/>
    <path d="M93 42 a30 30 0 0 1 0 44" opacity="0.7"/>
    <path d="M102 34 a42 42 0 0 1 0 60" opacity="0.45"/>
  </g>
</svg>
